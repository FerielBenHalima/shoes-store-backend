spring.application.name=store_backend
server.port=${PORT:8080}

# Database
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/shoes_store}
spring.datasource.username=${DATABASE_USERNAME:shoes_store_user}
spring.datasource.password=${DATABASE_PASSWORD:store123}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

app.jwt.secret=${JWT_SECRET:mansour-secret-key-2024}
app.jwt.expiration=${JWT_EXPIRATION:86400000}

app.admin.email=${ADMIN_EMAIL:admin@store.tn}
app.admin.password=${ADMIN_PASSWORD:admin123}

app.upload.dir=${UPLOAD_DIR:uploads/}